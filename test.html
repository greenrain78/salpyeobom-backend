<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Salpyeobom API Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 24px; }
    h1 { color: #569cd6; margin-bottom: 24px; font-size: 18px; }
    h2 { color: #9cdcfe; font-size: 13px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }
    .card { background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; padding: 16px; }

    input, textarea, select {
      width: 100%; padding: 6px 8px; margin-bottom: 8px;
      background: #3c3c3c; border: 1px solid #555; border-radius: 4px;
      color: #d4d4d4; font-family: monospace; font-size: 12px;
    }
    button {
      padding: 6px 14px; background: #0e639c; border: none; border-radius: 4px;
      color: #fff; cursor: pointer; font-size: 12px; font-family: monospace;
    }
    button:hover { background: #1177bb; }

    .result {
      margin-top: 10px; padding: 8px; background: #1e1e1e; border-radius: 4px;
      font-size: 11px; max-height: 200px; overflow-y: auto; white-space: pre-wrap;
      word-break: break-all; border: 1px solid #3c3c3c;
    }
    .ok  { color: #4ec9b0; }
    .err { color: #f48771; }

    #token-bar {
      background: #252526; border: 1px solid #3c3c3c; border-radius: 6px;
      padding: 12px 16px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    #token-bar span { color: #808080; font-size: 12px; }
    #token-display {
      flex: 1; color: #ce9178; font-size: 11px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #token-bar button { background: #3c3c3c; font-size: 11px; }
  </style>
</head>
<body>

<h1>🩺 Salpyeobom API Tester</h1>

<div id="token-bar">
  <span>TOKEN</span>
  <span id="token-display">없음 — 로그인 후 자동 저장</span>
  <button onclick="clearToken()">초기화</button>
</div>

<div class="grid">

  <!-- 회원가입 -->
  <div class="card">
    <h2>POST /auth/register</h2>
    <input id="reg-username" placeholder="username" value="admin">
    <input id="reg-email" placeholder="email" value="admin@test.com">
    <input id="reg-password" placeholder="password (8자 이상)" value="securepass123">
    <button onclick="register()">회원가입</button>
    <div class="result" id="reg-result"></div>
  </div>

  <!-- 로그인 -->
  <div class="card">
    <h2>POST /auth/login</h2>
    <input id="login-username" placeholder="username" value="admin">
    <input id="login-password" placeholder="password" value="securepass123">
    <button onclick="login()">로그인 (토큰 저장)</button>
    <div class="result" id="login-result"></div>
  </div>

  <!-- 내 정보 -->
  <div class="card">
    <h2>GET /auth/me</h2>
    <button onclick="request('GET', '/api/v1/auth/me', null, 'me-result')">내 정보 조회</button>
    <div class="result" id="me-result"></div>
  </div>

  <!-- 대시보드 -->
  <div class="card">
    <h2>GET /dashboard/summary</h2>
    <button onclick="request('GET', '/api/v1/dashboard/summary', null, 'dash-result')">현황 조회</button>
    <div class="result" id="dash-result"></div>
  </div>

  <!-- 활성 상황 -->
  <div class="card">
    <h2>GET /situations/active</h2>
    <input id="sit-limit" placeholder="limit (기본 20)" value="20">
    <button onclick="activeSituations()">조회</button>
    <div class="result" id="sit-result"></div>
  </div>

  <!-- 조치 등록 -->
  <div class="card">
    <h2>POST /situations/{id}/actions</h2>
    <input id="action-sid" placeholder="situation_id">
    <select id="action-type">
      <option>유선 연락</option>
      <option>현장 출동</option>
      <option>기타</option>
    </select>
    <input id="action-note" placeholder="메모 (선택)">
    <select id="action-status">
      <option>조치 대기</option>
      <option>현장 출동</option>
      <option>조치 완료</option>
    </select>
    <button onclick="createAction()">조치 등록</button>
    <div class="result" id="action-result"></div>
  </div>

  <!-- 환자 목록 -->
  <div class="card">
    <h2>GET /patients</h2>
    <input id="pat-page" placeholder="page (기본 1)" value="1">
    <input id="pat-limit" placeholder="limit (기본 50)" value="50">
    <input id="pat-search" placeholder="이름 검색 (선택)">
    <button onclick="listPatients()">조회</button>
    <div class="result" id="pat-result"></div>
  </div>

  <!-- 환자 상세 -->
  <div class="card">
    <h2>GET /patients/{id}/details</h2>
    <input id="det-pid" placeholder="patient_id" value="user_1001">
    <button onclick="patientDetails()">상세 조회</button>
    <div class="result" id="det-result"></div>
  </div>

  <!-- 시계열 -->
  <div class="card">
    <h2>GET /patients/{id}/timeseries</h2>
    <input id="ts-pid" placeholder="patient_id" value="user_1001">
    <input id="ts-days" placeholder="days (기본 14)" value="14">
    <button onclick="timeseries()">조회</button>
    <div class="result" id="ts-result"></div>
  </div>

</div>

<script>
  const BASE = 'http://127.0.0.1:8000'
  let token = localStorage.getItem('token') || ''
  updateTokenBar()

  function updateTokenBar() {
    document.getElementById('token-display').textContent = token
      ? token.slice(0, 60) + '…'
      : '없음 — 로그인 후 자동 저장'
  }

  function clearToken() {
    token = ''
    localStorage.removeItem('token')
    updateTokenBar()
  }

  function show(id, data, ok = true) {
    const el = document.getElementById(id)
    el.textContent = JSON.stringify(data, null, 2)
    el.className = 'result ' + (ok ? 'ok' : 'err')
  }

  async function request(method, path, body, resultId) {
    try {
      const res = await fetch(BASE + path, {
        method,
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: 'Bearer ' + token } : {}),
        },
        body: body ? JSON.stringify(body) : undefined,
      })
      const data = await res.json()
      show(resultId, data, res.ok)
    } catch (e) {
      show(resultId, { error: e.message }, false)
    }
  }

  async function register() {
    await request('POST', '/api/v1/auth/register', {
      username: v('reg-username'),
      email: v('reg-email'),
      password: v('reg-password'),
    }, 'reg-result')
  }

  async function login() {
    try {
      const res = await fetch(BASE + '/api/v1/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: v('login-username'), password: v('login-password') }),
      })
      const data = await res.json()
      if (res.ok && data.access_token) {
        token = data.access_token
        localStorage.setItem('token', token)
        updateTokenBar()
      }
      show('login-result', data, res.ok)
    } catch (e) {
      show('login-result', { error: e.message }, false)
    }
  }

  function activeSituations() {
    const limit = v('sit-limit') || 20
    request('GET', `/api/v1/situations/active?limit=${limit}`, null, 'sit-result')
  }

  function createAction() {
    const sid = v('action-sid')
    if (!sid) return show('action-result', { error: 'situation_id를 입력하세요' }, false)
    request('POST', `/api/v1/situations/${sid}/actions`, {
      action_type: v('action-type'),
      action_note: v('action-note') || undefined,
      status_update: v('action-status'),
    }, 'action-result')
  }

  function listPatients() {
    const page = v('pat-page') || 1
    const limit = v('pat-limit') || 50
    const search = v('pat-search')
    const qs = new URLSearchParams({ page, limit, ...(search ? { search_name: search } : {}) })
    request('GET', `/api/v1/patients?${qs}`, null, 'pat-result')
  }

  function patientDetails() {
    request('GET', `/api/v1/patients/${v('det-pid')}/details`, null, 'det-result')
  }

  function timeseries() {
    const days = v('ts-days') || 14
    request('GET', `/api/v1/patients/${v('ts-pid')}/timeseries?days=${days}`, null, 'ts-result')
  }

  function v(id) {
    return document.getElementById(id).value.trim()
  }
</script>
</body>
</html>
